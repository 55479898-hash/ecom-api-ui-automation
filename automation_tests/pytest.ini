[pytest]
testpaths = api ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --alluredir=reports/allure-results --html=reports/report.html --self-contained-html
markers =
    api: API interface tests
    ui: UI automation tests
    order: Order flow tests
    payment: Payment callback tests
    smoke: Quick smoke tests

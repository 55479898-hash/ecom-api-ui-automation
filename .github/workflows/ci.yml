name: CI - Automated Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-api-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r ecom_app/requirements.txt
          pip install -r automation_tests/requirements.txt

      - name: Run API tests
        env:
          ECOM_BASE_URL: http://127.0.0.1:8000
          PYTHONPATH: ${{ github.workspace }}/ecom_app
        run: |
          cd ecom_app
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/ecom-server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/api/products >/dev/null && break
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8000/api/products >/dev/null || { cat /tmp/ecom-server.log; exit 1; }
          cd "${{ github.workspace }}/automation_tests"
          mkdir -p reports/allure-results
          pytest api/ -m api

      - name: Upload pytest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-pytest-report
          path: automation_tests/reports/report.html

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: automation_tests/reports/allure-results

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r ecom_app/requirements.txt
          pip install -r automation_tests/requirements.txt
          playwright install --with-deps chromium

      - name: Wait for toolchain
        run: python --version

      - name: Run UI tests
        env:
          ECOM_BASE_URL: http://127.0.0.1:8000
          PYTHONPATH: ${{ github.workspace }}/ecom_app
        run: |
          cd ecom_app
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/ecom-server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/api/products >/dev/null \
              && curl -fsS http://127.0.0.1:8000/login >/dev/null && break
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8000/login >/dev/null || { cat /tmp/ecom-server.log; exit 1; }
          cd "${{ github.workspace }}/automation_tests"
          mkdir -p reports/allure-results
          pytest ui/ -m ui

      - name: Upload UI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: automation_tests/reports/allure-results

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}电商演示系统{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar" data-testid="navbar">
    <a href="/" class="logo" data-testid="nav-home">🛒 EcomDemo</a>
    <div class="nav-links">
      <a href="/products" data-testid="nav-products">商品</a>
      <a href="/cart" data-testid="nav-cart">购物车 <span id="cart-badge" class="badge" data-testid="cart-badge">0</span></a>
      <a href="/orders" data-testid="nav-orders">订单</a>
      <a href="/login" data-testid="nav-login" id="login-link">登录</a>
      <span id="user-info" data-testid="user-info" class="user-info hidden"></span>
      <button id="logout-btn" data-testid="logout-btn" class="btn btn-sm hidden">退出</button>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast hidden" data-testid="toast"></div>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
